version = 0.1
[default.deploy.parameters]
stack_name = "ses-event-manager"
resolve_s3 = true
s3_prefix = "ses-event-manager"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = "BounceSNSTopic=\"arn:aws:sns:us-east-1:830321976775:ses-event\" STAGE=\"produccion\" Recipients=\"cases.febos.cl,inbound.febos.cl,inbox.febos.cl,c.in.febos.cl,empresas.febos.cl,empresas.febos.io,febos.cl,firmas.febos.cl,in.febos.cl,prd.inbox.febos.cl\""
image_repositories = []
#on_failure = 'DELETE'
disable_rollback = true

[test.deploy.parameters]
