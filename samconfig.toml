resolve_s3 = true
s3_prefix = "ses-event-manager-test"
region = "us-east-1"
capabilities = "CAPABILITY_IAM"
parameter_overrides = "BounceSNSTopic=\"arn:aws:sns:us-east-1:830321976775:ses-event\" STAGE=\"test\" Recipients=\"cases-test.febos.cl,inbound-test.febos.cl,inbox-test.febos.cl\""
image_repositories = []
#on_failure = 'DELETE'
